<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Plata - Con Ahorros</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-secondary: #a0a0a0;
            --color-ingreso: #4caf50;
            --color-gasto: #f44336;
            --color-ahorro: #2196f3;
            --color-accent: #bb86fc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top));
        }

        .app-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; }
        .card { background-color: var(--card-bg); padding: 18px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }

        /* Balances Encabezado */
        .balances-header { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .bal-main { grid-column: span 2; padding: 10px 0; }
        .bal-val { font-size: 2.2rem; font-weight: 800; text-align: center; }
        .bal-label { font-size: 0.7rem; color: var(--text-secondary); text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .bal-sub { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 10px; border: 1px solid #333; }
        .bal-sub .bal-val { font-size: 1.2rem; color: var(--color-ahorro); }

        /* Inputs */
        input {
            width: 100%; padding: 14px; font-size: 1rem; border-radius: 12px; margin-bottom: 10px;
            border: 2px solid #333; background: #252525; color: white; outline: none;
        }
        input:focus { border-color: var(--color-accent); }
        #montoInput { font-size: 1.8rem; text-align: center; font-weight: bold; color: var(--color-accent); }

        .botones-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { padding: 15px 5px; font-size: 0.85rem; font-weight: 800; border: none; border-radius: 12px; color: white; cursor: pointer; }
        .btn-ingreso { background: var(--color-ingreso); }
        .btn-gasto { background: var(--color-gasto); }
        .btn-ahorro { background: var(--color-ahorro); }
        .btn:active { transform: scale(0.95); }

        /* Reporte */
        .report-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        .stat-box { padding: 8px; border-radius: 10px; background: #252525; text-align: center; }
        .stat-label { font-size: 0.6rem; color: var(--text-secondary); text-transform: uppercase; }
        .stat-val { font-size: 0.9rem; font-weight: bold; }

        .history-list { max-height: 250px; overflow-y: auto; }
        .movimiento { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2d2d2d; }
        .mov-detalle { font-weight: 500; font-size: 0.95rem; text-transform: capitalize; }
        .mov-fecha { font-size: 0.7rem; color: var(--text-secondary); }

        .btn-reset { background: none; border: none; color: #444; font-size: 0.7rem; margin-top: 10px; align-self: center; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="card balances-header">
            <div class="bal-main">
                <div class="bal-label">Disponible Actual</div>
                <div id="balanceTotal" class="bal-val">$ 0</div>
            </div>
            <div class="bal-sub">
                <div class="bal-label">Ahorro Acumulado</div>
                <div id="ahorroTotal" class="bal-val" style="text-align: center;">$ 0</div>
            </div>
            <div class="bal-sub">
                <div class="bal-label">Patrimonio Total</div>
                <div id="patrimonioTotal" class="bal-val" style="color: #fff; text-align: center;">$ 0</div>
            </div>
        </div>

        <div class="card">
            <input type="text" id="montoInput" placeholder="0" inputmode="decimal">
            <input type="text" id="detalleInput" placeholder="Palabra clave (obligatoria)">
            <div class="botones-container">
                <button class="btn btn-gasto" onclick="registrar('gasto')">− GASTO</button>
                <button class="btn btn-ahorro" onclick="registrar('ahorro')">💾 AHORRAR</button>
                <button class="btn btn-ingreso" onclick="registrar('ingreso')">+ INGRESO</button>
            </div>
        </div>

        <div class="card">
            <h2 style="font-size: 0.9rem; margin-bottom: 10px; color: var(--text-secondary);">📊 REPORTE (MÁX 30 DÍAS)</h2>
            
            <div style="margin-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <input type="date" id="fechaDesde" style="font-size: 0.8rem;" onchange="actualizarReporte()">
                <input type="date" id="fechaHasta" style="font-size: 0.8rem;" onchange="actualizarReporte()">
            </div>
            <input type="text" id="busquedaClave" placeholder="Buscar palabra clave..." oninput="actualizarReporte()">

            <div class="report-grid">
                <div class="stat-box">
                    <div class="stat-label">Ingresos</div>
                    <div id="resumenIngreso" class="stat-val" style="color: var(--color-ingreso)">$ 0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Gastos</div>
                    <div id="resumenGasto" class="stat-val" style="color: var(--color-gasto)">$ 0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Ahorros</div>
                    <div id="resumenAhorro" class="stat-val" style="color: var(--color-ahorro)">$ 0</div>
                </div>
            </div>

            <div id="listaMovimientos" class="history-list"></div>
        </div>

        <button class="btn-reset" onclick="borrarTodo()">Reiniciar App</button>
    </div>

    <script>
        let saldo = parseFloat(localStorage.getItem('saldo_v4')) || 0;
        let ahorros = parseFloat(localStorage.getItem('ahorros_v4')) || 0;
        let movimientos = JSON.parse(localStorage.getItem('historial_v4')) || [];

        document.getElementById('fechaHasta').value = new Date().toISOString().split('T')[0];

        // --- LÓGICA DEL SEPARADOR DE MILES EN TIEMPO REAL ---
        const montoInput = document.getElementById('montoInput');
        montoInput.addEventListener('input', function(e) {
            let valor = e.target.value.replace(/\D/g, ""); // Elimina lo que no sea número
            if (valor === "") {
                e.target.value = "";
                return;
            }
            // Formatea con puntos
            e.target.value = new Intl.NumberFormat('es-AR').format(parseInt(valor));
        });

        function formatearMoneda(n) {
            return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 }).format(n);
        }

        function actualizarReporte() {
            const desde = document.getElementById('fechaDesde').value;
            const hasta = document.getElementById('fechaHasta').value;
            const clave = document.getElementById('busquedaClave').value.toLowerCase();

            let totalIn = 0, totalOut = 0, totalSave = 0;
            const lista = document.getElementById('listaMovimientos');
            lista.innerHTML = '';

            const filtrados = movimientos.filter(m => {
                const fMov = m.timestamp.split('T')[0];
                return ((!desde || fMov >= desde) && (!hasta || fMov <= hasta)) && m.detalle.toLowerCase().includes(clave);
            });

            filtrados.reverse().forEach(m => {
                if (m.tipo === 'ingreso') totalIn += m.monto;
                else if (m.tipo === 'gasto') totalOut += m.monto;
                else if (m.tipo === 'ahorro') totalSave += m.monto;

                let color = m.tipo === 'ingreso' ? 'var(--color-ingreso)' : (m.tipo === 'gasto' ? 'var(--color-gasto)' : 'var(--color-ahorro)');
                let signo = m.tipo === 'ingreso' ? '+' : '-';

                const item = document.createElement('div');
                item.className = 'movimiento';
                item.innerHTML = `
                    <div><div class="mov-detalle">${m.detalle}</div><div class="mov-fecha">${new Date(m.timestamp).toLocaleDateString()}</div></div>
                    <div style="font-weight:bold; color: ${color}">${signo} ${formatearMoneda(m.monto)}</div>
                `;
                lista.appendChild(item);
            });

            document.getElementById('resumenIngreso').innerText = formatearMoneda(totalIn);
            document.getElementById('resumenGasto').innerText = formatearMoneda(totalOut);
            document.getElementById('resumenAhorro').innerText = formatearMoneda(totalSave);
            
            document.getElementById('balanceTotal').innerText = formatearMoneda(saldo);
            document.getElementById('balanceTotal').style.color = saldo >= 0 ? 'var(--color-ingreso)' : 'var(--color-gasto)';
            document.getElementById('ahorroTotal').innerText = formatearMoneda(ahorros);
            document.getElementById('patrimonioTotal').innerText = formatearMoneda(saldo + ahorros);

            localStorage.setItem('saldo_v4', saldo);
            localStorage.setItem('ahorros_v4', ahorros);
            localStorage.setItem('historial_v4', JSON.stringify(movimientos));
        }

        function registrar(tipo) {
            const dInput = document.getElementById('detalleInput');
            
            // IMPORTANTE: Quitamos los puntos de formato antes de procesar el número
            const montoLimpio = montoInput.value.replace(/\./g, "");
            const monto = parseFloat(montoLimpio);
            const detalle = dInput.value.trim();

            if (isNaN(monto) || monto <= 0) return alert("Ingresa un monto válido");
            if (!detalle) return alert("Escribe una palabra clave");

            if (tipo === 'gasto') {
                saldo -= monto;
            } else if (tipo === 'ingreso') {
                saldo += monto;
            } else if (tipo === 'ahorro') {
                if(monto > saldo) return alert("No tienes suficiente disponible.");
                saldo -= monto;
                ahorros += monto;
            }

            movimientos.push({ tipo, monto, detalle, timestamp: new Date().toISOString() });
            
            montoInput.value = ''; 
            dInput.value = '';
            actualizarReporte();
        }

        function borrarTodo() { if (confirm("¿Borrar todo el historial?")) { saldo = 0; ahorros = 0; movimientos = []; actualizarReporte(); } }
        actualizarReporte();
    </script>
</body>
</html>
